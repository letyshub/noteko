name: CI

on:
  push:
    branches: [mvp]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: sudo apt-get install -y build-essential python3
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    needs: quality
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y build-essential python3 rpm
      - run: npm ci
      - run: npm rebuild better-sqlite3
      - run: npm run test

  e2e:
    needs: test
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: sudo apt-get install -y build-essential python3 rpm
      - run: npm ci
      - name: Run e2e tests with Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          npm run package
          npm run test:e2e
